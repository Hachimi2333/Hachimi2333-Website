<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 文章封面生成器 · 1920x600 图标工坊</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: #f2f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            margin: 0;
        }
        
        .generator-container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 8px 16px rgba(0,0,0,0.06);
            padding: 24px;
            max-height: 95vh;
            overflow-y: auto;
        }
        
        .generator-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .generator-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0 0 4px 0;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .sub {
            color: #475569;
            margin-bottom: 20px;
            border-left: 4px solid #94a3b8;
            padding-left: 16px;
            font-size: 0.95rem;
        }
        
        .main-panel {
            display: flex;
            gap: 24px;
            flex-wrap: nowrap;
            align-items: stretch;
        }
        
        /* 左侧预览区 */
        .preview-area {
            flex: 1.4;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        
        .canvas-wrapper {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
            border: 2px solid #e9eef2;
            overflow: hidden;
            aspect-ratio: 1920/600;
            width: 100%;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: white;
            cursor: crosshair;
        }
        
        .preview-hint {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            color: #4b5563;
            font-size: 0.85rem;
            padding: 0 4px;
        }
        
        /* 右侧控制区 */
        .control-panel {
            flex: 1;
            min-width: 340px;
            background: #f9fafc;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            max-height: 100%;
        }
        
        .control-group {
            margin-bottom: 0;
        }
        
        .control-label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: #334155;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        /* 搜索框 */
        .icon-input-wrapper {
            display: flex;
            gap: 6px;
            align-items: center;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 3px 3px 3px 16px;
            transition: 0.2s;
        }
        
        .icon-input-wrapper:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        
        .icon-input-wrapper input {
            border: none;
            background: transparent;
            padding: 8px 0;
            font-size: 0.95rem;
            width: 1px;
            flex: 1;
            outline: none;
        }
        
        .icon-input-wrapper button {
            background: #eef2f6;
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1f2937;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        
        .icon-input-wrapper button:hover {
            background: #d1d9e2;
        }
        
        /* 搜索结果 */
        .search-results {
            margin-top: 10px;
            max-height: 140px;
            overflow-y: auto;
            background: white;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #dee4ea;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 6px;
        }
        
        .icon-option {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafd;
            border-radius: 12px;
            border: 1px solid #dde3e9;
            cursor: pointer;
            transition: 0.15s;
            padding: 4px;
        }
        
        .icon-option:hover {
            border-color: #3b82f6;
            background: #eff6ff;
            transform: scale(1.02);
        }
        
        .icon-option.selected {
            border-color: #2563eb;
            background: #dbeafe;
            box-shadow: 0 0 0 2px #3b82f6;
        }
        
        .icon-option img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }
        
        .placeholder-text {
            grid-column: 1 / -1;
            color: #6b7280;
            text-align: center;
            padding: 16px;
            font-style: italic;
            font-size: 0.9rem;
        }
        
        /* 上传区域 - 新增 */
        .upload-area {
            margin-top: 8px;
            border: 2px dashed #cbd5e1;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            background: white;
            transition: 0.2s;
            cursor: pointer;
        }
        
        .upload-area:hover {
            border-color: #3b82f6;
            background: #f0f9ff;
        }
        
        .upload-area.dragover {
            border-color: #3b82f6;
            background: #dbeafe;
        }
        
        .upload-icon {
            font-size: 24px;
            margin-bottom: 8px;
            color: #64748b;
        }
        
        .upload-text {
            color: #334155;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        
        .upload-hint {
            color: #94a3b8;
            font-size: 0.8rem;
        }
        
        .uploaded-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #e8f0fe;
            border-radius: 40px;
            padding: 8px 16px;
            margin-top: 8px;
        }
        
        .uploaded-info span {
            color: #1e293b;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 200px;
        }
        
        .remove-upload {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 4px;
        }
        
        .remove-upload:hover {
            color: #dc2626;
        }
        
        /* 滑块控制 */
        .slider-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .slider-control input[type=range] {
            flex: 1;
            height: 5px;
            border-radius: 10px;
            background: #d4dce3;
        }
        
        .slider-control span {
            min-width: 45px;
            background: white;
            border: 1px solid #cdd9e6;
            border-radius: 20px;
            padding: 4px 8px;
            text-align: center;
            font-size: 0.85rem;
        }
        
        /* 颜色控制 */
        .color-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .color-row label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        input[type=color] {
            width: 40px;
            height: 32px;
            border: 1px solid #bdc9d6;
            border-radius: 20px;
            background: white;
            padding: 2px;
            cursor: pointer;
        }
        
        /* 文件名输入框 */
        .filename-input-wrapper {
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 3px 3px 3px 16px;
        }
        
        .filename-input-wrapper input {
            border: none;
            background: transparent;
            padding: 8px 0;
            font-size: 0.95rem;
            width: 1px;
            flex: 1;
            outline: none;
        }
        
        .filename-input-wrapper span {
            background: #eef2f6;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.9rem;
            color: #4b5563;
            white-space: nowrap;
        }
        
        /* 导出按钮组 */
        .export-buttons {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }
        
        .btn {
            background: white;
            border: 1px solid #bac8d9;
            padding: 10px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #1e293b;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            justify-content: center;
        }
        
        .btn-primary {
            background: #1e293b;
            border-color: #1e293b;
            color: white;
        }
        
        .btn-primary:hover {
            background: #0f172a;
        }
        
        .btn:hover {
            background: #e9eef3;
        }
        
        .error-message {
            color: #b91c1c;
            font-size: 0.8rem;
            margin-top: 4px;
            min-height: 18px;
        }
        
        .footer-note {
            margin-top: 16px;
            border-top: 1px dashed #cbd5e1;
            padding-top: 12px;
            color: #64748b;
            font-size: 0.8rem;
            text-align: center;
        }
        
        /* 图标类型标签 */
        .icon-type-tag {
            display: inline-block;
            background: #e2e8f0;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.7rem;
            color: #475569;
            margin-left: 8px;
        }
    </style>
</head>
<body>
<div class="generator-container">
    <h1>📷 文章封面生成器 · 1920x600</h1>
    <div class="sub">纯白背景 · 居中图标 · 支持 Iconify 和上传图片 · 导出 PNG / WebP</div>

    <div class="main-panel">
        <!-- 左侧预览区 -->
        <div class="preview-area">
            <div class="canvas-wrapper">
                <canvas id="coverCanvas" width="1920" height="600"></canvas>
            </div>
            <div class="preview-hint">
                <span>⚡ 1920x600 px</span>
                <span id="iconInfoDisplay">🔄 未选择图标</span>
            </div>
        </div>

        <!-- 右侧控制区 -->
        <div class="control-panel">
            <!-- 图标搜索 -->
            <div class="control-group">
                <div class="control-label">
                    <span>🔍</span> Iconify 图标搜索
                    <span class="icon-type-tag">在线图标库</span>
                </div>
                <div class="icon-input-wrapper">
                    <input type="text" id="iconInput" placeholder="例如: mdi:home, fa:bell..." autocomplete="off">
                    <button id="searchBtn">搜索</button>
                </div>
                <div id="searchStatus" class="error-message"></div>
            </div>

            <!-- 搜索结果 -->
            <div class="control-group">
                <div class="control-label"><span>📦</span> 点击选择图标</div>
                <div id="resultsContainer" class="search-results">
                    <div class="placeholder-text">输入关键词并搜索</div>
                </div>
            </div>

            <!-- 上传图片区域 - 新增 -->
            <div class="control-group">
                <div class="control-label">
                    <span>📤</span> 上传图片作为图标
                    <span class="icon-type-tag">PNG / JPG / SVG</span>
                </div>
                <div id="uploadArea" class="upload-area">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">点击或拖拽上传图片</div>
                    <div class="upload-hint">支持 PNG、JPG、SVG (最大 5MB)</div>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                </div>
                <div id="uploadedInfo" class="uploaded-info" style="display: none;">
                    <span id="uploadedFileName"></span>
                    <button id="removeUpload" class="remove-upload">✕</button>
                </div>
            </div>

            <!-- 图标大小 -->
            <div class="control-group">
                <div class="control-label"><span>📏</span> 图标大小</div>
                <div class="slider-control">
                    <input type="range" id="sizeSlider" min="20" max="500" value="360" step="2">
                    <span id="sizeValue">360px</span>
                </div>
            </div>

            <!-- 颜色选项 - 上传图片时禁用 -->
            <div class="control-group">
                <div class="control-label"><span>🎨</span> 图标颜色</div>
                <div class="color-row">
                    <label>
                        <input type="radio" name="colorMode" id="useOriginalColor" value="original" checked> 默认
                    </label>
                    <label>
                        <input type="radio" name="colorMode" id="useCustomColor" value="custom"> 自定义
                    </label>
                    <input type="color" id="customColorPicker" value="#3b82f6" disabled>
                </div>
            </div>

            <!-- 文件名设置 -->
            <div class="control-group">
                <div class="control-label"><span>📝</span> 导出文件名</div>
                <div class="filename-input-wrapper">
                    <input type="text" id="filenameInput" placeholder="my-cover" value="article-cover">
                    <span>.png / .webp</span>
                </div>
            </div>

            <!-- 导出按钮组 -->
            <div class="export-buttons">
                <button class="btn" id="exportPngBtn">📥 PNG</button>
                <button class="btn" id="exportWebpBtn">📥 WebP</button>
            </div>
            
            <!-- 重置按钮 -->
            <button class="btn btn-primary" id="resetBtn" style="margin-top: 4px;">⟲ 重置所有</button>
        </div>
    </div>
    
    <div class="footer-note">
        ⚡ Iconify 图标库 · 支持上传图片 · 自定义颜色 · 实时调整 · 一键导出
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('coverCanvas');
        const ctx = canvas.getContext('2d');
        const iconInput = document.getElementById('iconInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsContainer = document.getElementById('resultsContainer');
        const searchStatus = document.getElementById('searchStatus');
        const sizeSlider = document.getElementById('sizeSlider');
        const sizeValue = document.getElementById('sizeValue');
        const useOriginal = document.getElementById('useOriginalColor');
        const useCustom = document.getElementById('useCustomColor');
        const customColorPicker = document.getElementById('customColorPicker');
        const iconInfoDisplay = document.getElementById('iconInfoDisplay');
        const exportPng = document.getElementById('exportPngBtn');
        const exportWebp = document.getElementById('exportWebpBtn');
        const resetBtn = document.getElementById('resetBtn');
        const filenameInput = document.getElementById('filenameInput');
        
        // 上传相关元素
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadedInfo = document.getElementById('uploadedInfo');
        const uploadedFileName = document.getElementById('uploadedFileName');
        const removeUpload = document.getElementById('removeUpload');

        // 状态
        let currentIconName = '';
        let currentIconSvg = null;
        let currentIconSize = 360;
        let isCustomColor = false;
        let customColor = '#3b82f6';
        
        // 上传图片相关状态
        let uploadedImageData = null;  // 存储上传的图片数据URL
        let isUsingUploadedImage = false;  // 是否正在使用上传的图片
        
        // 缓存原始SVG
        let originalSvgString = null;

        // 更新大小显示并重绘
        function updateSizeAndRedraw() {
            currentIconSize = parseInt(sizeSlider.value, 10);
            sizeValue.innerText = currentIconSize + 'px';
            if (currentIconSvg || uploadedImageData) {
                drawCanvas();
            }
        }
        sizeSlider.addEventListener('input', updateSizeAndRedraw);

        // 颜色单选框逻辑
        useOriginal.addEventListener('change', (e) => {
            if (e.target.checked) {
                customColorPicker.disabled = true;
                isCustomColor = false;
                if (currentIconSvg && !isUsingUploadedImage) drawCanvas();
            }
        });
        
        useCustom.addEventListener('change', (e) => {
            if (e.target.checked) {
                customColorPicker.disabled = false;
                isCustomColor = true;
                customColor = customColorPicker.value;
                if (currentIconSvg && !isUsingUploadedImage) drawCanvas();
            }
        });
        
        customColorPicker.addEventListener('input', (e) => {
            if (useCustom.checked) {
                customColor = e.target.value;
                if (currentIconSvg && !isUsingUploadedImage) drawCanvas();
            }
        });

        // 上传图片相关事件
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileUpload(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileUpload(e.target.files[0]);
            }
        });

        removeUpload.addEventListener('click', (e) => {
            e.stopPropagation();
            clearUploadedImage();
        });

        function handleFileUpload(file) {
            // 检查文件大小 (5MB限制)
            if (file.size > 5 * 1024 * 1024) {
                alert('文件大小不能超过5MB');
                return;
            }

            // 检查文件类型
            if (!file.type.startsWith('image/')) {
                alert('请上传图片文件');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                // 清除当前选中的图标
                clearIconSelection();
                
                // 存储上传的图片数据
                uploadedImageData = e.target.result;
                isUsingUploadedImage = true;
                
                // 显示上传信息
                uploadedFileName.textContent = file.name;
                uploadedInfo.style.display = 'flex';
                uploadArea.style.display = 'none';
                
                // 禁用颜色选择（上传的图片不能改颜色）
                useOriginal.checked = true;
                useCustom.disabled = true;
                customColorPicker.disabled = true;
                isCustomColor = false;
                
                // 加载图片并绘制
                loadUploadedImage();
            };
            reader.readAsDataURL(file);
        }

        function clearUploadedImage() {
            uploadedImageData = null;
            isUsingUploadedImage = false;
            uploadedInfo.style.display = 'none';
            uploadArea.style.display = 'block';
            fileInput.value = '';
            
            // 重新启用颜色选择
            useCustom.disabled = false;
            if (useCustom.checked) {
                customColorPicker.disabled = false;
            }
            
            // 如果有之前加载的Iconify图标，重新绘制
            if (currentIconSvg) {
                drawCanvas();
            } else {
                clearCanvas();
                iconInfoDisplay.innerText = '🔄 未选择图标';
            }
        }

        function loadUploadedImage() {
            if (!uploadedImageData) return;
            
            const img = new Image();
            img.onload = () => {
                // 计算绘制尺寸
                const targetSize = currentIconSize;
                let drawWidth, drawHeight;
                
                if (img.width >= img.height) {
                    drawWidth = targetSize;
                    drawHeight = (img.height / img.width) * targetSize;
                } else {
                    drawHeight = targetSize;
                    drawWidth = (img.width / img.height) * targetSize;
                }
                
                drawWidth = Math.max(1, Math.round(drawWidth));
                drawHeight = Math.max(1, Math.round(drawHeight));
                
                // 清空画布并绘制
                clearCanvas();
                
                const x = Math.round((canvas.width - drawWidth) / 2);
                const y = Math.round((canvas.height - drawHeight) / 2);
                
                ctx.drawImage(img, x, y, drawWidth, drawHeight);
                
                iconInfoDisplay.innerText = `🖼️ 上传图片  ${drawWidth}x${drawHeight}px`;
            };
            img.src = uploadedImageData;
        }

        function clearCanvas() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function clearIconSelection() {
            // 清除搜索结果中的选中状态
            document.querySelectorAll('.icon-option').forEach(opt => opt.classList.remove('selected'));
        }

        /**
         * 使用DOMParser安全修改SVG颜色
         */
        function applyColorToSvg(svgString, color) {
            if (!color || !svgString) return svgString;
            
            try {
                const parser = new DOMParser();
                const svgDoc = parser.parseFromString(svgString, 'image/svg+xml');
                const svgElement = svgDoc.documentElement;
                
                if (svgElement.tagName !== 'svg') {
                    return svgString;
                }
                
                // 递归设置fill
                function setFillRecursive(element) {
                    if (element.tagName === 'defs' || element.tagName === 'style' || element.tagName === 'script') {
                        return;
                    }
                    
                    const currentFill = element.getAttribute('fill');
                    if (currentFill !== 'none') {
                        element.setAttribute('fill', color);
                    }
                    
                    for (let i = 0; i < element.children.length; i++) {
                        setFillRecursive(element.children[i]);
                    }
                }
                
                setFillRecursive(svgElement);
                
                // 额外处理所有元素
                const allElements = svgElement.querySelectorAll('*');
                allElements.forEach(el => {
                    if (el.tagName !== 'defs' && el.tagName !== 'style' && el.tagName !== 'script') {
                        const fill = el.getAttribute('fill');
                        if (fill !== 'none') {
                            el.setAttribute('fill', color);
                        }
                    }
                });
                
                const serializer = new XMLSerializer();
                return serializer.serializeToString(svgElement);
                
            } catch (error) {
                console.error('颜色修改失败:', error);
                return svgString;
            }
        }

        /**
         * 绘制函数
         */
        function drawCanvas() {
            clearCanvas();
            
            // 如果正在使用上传的图片
            if (isUsingUploadedImage && uploadedImageData) {
                loadUploadedImage();
                return;
            }
            
            if (!currentIconSvg || !currentIconName) {
                iconInfoDisplay.innerText = '⛔ 未选择图标';
                return;
            }

            let svgToRender = currentIconSvg;
            if (isCustomColor) {
                svgToRender = applyColorToSvg(currentIconSvg, customColor);
            }

            const img = new Image();
            const svgBlob = new Blob([svgToRender], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(svgBlob);

            img.onload = () => {
                let iconWidth = img.naturalWidth;
                let iconHeight = img.naturalHeight;
                
                if (!iconWidth || !iconHeight || iconWidth === 0 || iconHeight === 0) {
                    iconWidth = 100;
                    iconHeight = 100;
                }
                
                const targetSize = currentIconSize;
                let drawWidth, drawHeight;
                
                if (iconWidth >= iconHeight) {
                    drawWidth = targetSize;
                    drawHeight = (iconHeight / iconWidth) * targetSize;
                } else {
                    drawHeight = targetSize;
                    drawWidth = (iconWidth / iconHeight) * targetSize;
                }
                
                drawWidth = Math.max(1, Math.round(drawWidth));
                drawHeight = Math.max(1, Math.round(drawHeight));
                
                const x = Math.round((canvas.width - drawWidth) / 2);
                const y = Math.round((canvas.height - drawHeight) / 2);
                
                ctx.drawImage(img, x, y, drawWidth, drawHeight);
                
                iconInfoDisplay.innerText = `🖼️ ${currentIconName}  ${drawWidth}x${drawHeight}px`;
                URL.revokeObjectURL(url);
            };

            img.onerror = (err) => {
                console.error('图像加载失败:', err);
                iconInfoDisplay.innerText = '⚠️ 图标加载失败';
                URL.revokeObjectURL(url);
            };

            img.src = url;
        }

        // 加载图标
        function loadIconByName(iconName) {
            if (!iconName) return;
            
            // 如果正在使用上传的图片，先清除
            if (isUsingUploadedImage) {
                clearUploadedImage();
            }
            
            searchStatus.innerText = '⏳ 加载中...';
            currentIconName = iconName;
            
            fetch(`https://api.iconify.design/${iconName}.svg`)
                .then(res => {
                    if (!res.ok) {
                        throw new Error(`图标不存在 (${res.status})`);
                    }
                    return res.text();
                })
                .then(svg => {
                    currentIconSvg = svg;
                    originalSvgString = svg;
                    searchStatus.innerText = `✅ 已加载: ${iconName}`;
                    drawCanvas();
                })
                .catch(err => {
                    searchStatus.innerText = `❌ 加载失败: ${err.message}`;
                    currentIconSvg = null;
                    currentIconName = '';
                    drawCanvas();
                });
        }

        // 搜索图标
        function searchIcons(query) {
            if (!query.trim()) {
                resultsContainer.innerHTML = `<div class="placeholder-text">请输入搜索词</div>`;
                return;
            }
            
            searchStatus.innerText = '🔎 搜索中...';
            
            fetch(`https://api.iconify.design/search?query=${encodeURIComponent(query)}&limit=30`)
                .then(res => res.json())
                .then(data => {
                    const icons = data.icons || [];
                    
                    if (icons.length === 0) {
                        resultsContainer.innerHTML = `<div class="placeholder-text">没有找到图标 :(</div>`;
                        searchStatus.innerText = '⚠️ 无结果';
                        return;
                    }
                    
                    resultsContainer.innerHTML = '';
                    
                    icons.forEach(iconName => {
                        const div = document.createElement('div');
                        div.className = 'icon-option';
                        
                        const img = document.createElement('img');
                        img.src = `https://api.iconify.design/${iconName}.svg`;
                        img.alt = iconName;
                        img.loading = 'lazy';
                        
                        div.appendChild(img);
                        div.title = iconName;
                        div.dataset.iconName = iconName;
                        
                        div.addEventListener('click', (e) => {
                            document.querySelectorAll('.icon-option').forEach(opt => opt.classList.remove('selected'));
                            div.classList.add('selected');
                            const selectedIcon = div.dataset.iconName;
                            iconInput.value = selectedIcon;
                            loadIconByName(selectedIcon);
                        });
                        
                        resultsContainer.appendChild(div);
                    });
                    
                    searchStatus.innerText = `🔍 找到 ${icons.length} 个图标`;
                })
                .catch(err => {
                    searchStatus.innerText = `❌ 搜索出错`;
                    resultsContainer.innerHTML = `<div class="placeholder-text">请求失败，请重试</div>`;
                });
        }

        // 事件绑定
        searchBtn.addEventListener('click', () => {
            const query = iconInput.value.trim();
            if (query.indexOf(':') > -1 && !query.includes(' ')) {
                loadIconByName(query);
                searchIcons(query);
            } else {
                searchIcons(query);
            }
        });

        iconInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                searchBtn.click();
            }
        });

        resetBtn.addEventListener('click', () => {
            // 清除图标状态
            currentIconName = '';
            currentIconSvg = null;
            originalSvgString = null;
            
            // 清除上传图片
            clearUploadedImage();
            
            // 清除搜索结果
            resultsContainer.innerHTML = `<div class="placeholder-text">输入关键词并搜索</div>`;
            searchStatus.innerText = '';
            iconInput.value = '';
            
            // 重置滑块
            sizeSlider.value = 360;
            sizeValue.innerText = '360px';
            currentIconSize = 360;
            
            // 重置颜色
            useOriginal.checked = true;
            useCustom.disabled = false;
            customColorPicker.disabled = true;
            isCustomColor = false;
            
            // 重置文件名
            filenameInput.value = 'article-cover';
            
            // 清空画布
            clearCanvas();
            iconInfoDisplay.innerText = '🔄 未选择图标';
        });

        // 导出功能
        function exportCanvas(format) {
            if (!currentIconSvg && !uploadedImageData) {
                alert('请先选择一个图标或上传图片');
                return;
            }
            
            const mime = format === 'png' ? 'image/png' : 'image/webp';
            const ext = format;
            
            // 获取文件名
            let fileName = filenameInput.value.trim() || 'article-cover';
            fileName = fileName.replace(/[^a-z0-9\u4e00-\u9fa5\-_]/gi, '-');
            
            canvas.toBlob((blob) => {
                const link = document.createElement('a');
                link.download = `${fileName}.${ext}`;
                link.href = URL.createObjectURL(blob);
                link.click();
                URL.revokeObjectURL(link.href);
            }, mime, 1);
        }

        exportPng.addEventListener('click', () => exportCanvas('png'));
        exportWebp.addEventListener('click', () => exportCanvas('webp'));

        // 初始化
        clearCanvas();
        
        // 加载默认图标
        window.addEventListener('load', () => {
            loadIconByName('mdi:home');
            iconInput.value = 'mdi:home';
            searchIcons('home');
            sizeSlider.value = 360;
            sizeValue.innerText = '360px';
            currentIconSize = 360;
        });
    })();
</script>
</body>
</html>
